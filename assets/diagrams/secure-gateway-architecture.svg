<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720" role="img" aria-labelledby="title desc">
  <title id="title">Architecture of the unidirectional data transmission platform</title>
  <desc id="desc">A diagram showing a transmitter unit and receiver unit connected by one-way fiber optic modules.</desc>
  <defs>
    <style>
      .frame { fill: #d8ead1; stroke: #95be8d; stroke-width: 3; }
      .panel { fill: #f7f7f7; stroke: #8f8f8f; stroke-width: 3; }
      .block { fill: #ffffff; stroke: #4a4a4a; stroke-width: 3; }
      .label { font-family: Arial, Helvetica, sans-serif; fill: #1f1f1f; text-anchor: middle; }
      .title { font-size: 28px; font-weight: 600; }
      .section { font-size: 24px; font-weight: 500; }
      .copy { font-size: 22px; }
      .line { stroke: #4a4a4a; stroke-width: 3; fill: none; }
    </style>
  </defs>

  <rect class="frame" x="25" y="25" width="1550" height="670" rx="85" />
  <text class="label title" x="800" y="90">Architecture of the unidirectional data transmission platform</text>

  <rect class="panel" x="55" y="130" width="700" height="495" rx="52" />
  <rect class="panel" x="845" y="130" width="700" height="495" rx="52" />

  <text class="label section" x="405" y="185">Transmitter unit</text>
  <text class="label section" x="1195" y="185">Receiver unit</text>

  <rect class="block" x="85" y="225" width="215" height="88" rx="14" />
  <text class="label copy" x="193" y="263">
    <tspan x="193" dy="0">unsecure network</tspan>
    <tspan x="193" dy="28">port</tspan>
  </text>

  <rect class="block" x="310" y="225" width="190" height="88" rx="14" />
  <text class="label copy" x="405" y="263">
    <tspan x="405" dy="0">Storage</tspan>
    <tspan x="405" dy="28">modules</tspan>
  </text>

  <rect class="block" x="85" y="365" width="205" height="70" rx="14" />
  <text class="label copy" x="188" y="408">power supply</text>

  <rect class="block" x="120" y="510" width="230" height="68" rx="14" />
  <text class="label copy" x="235" y="553">I/O</text>

  <rect class="block" x="300" y="365" width="200" height="92" rx="14" />
  <text class="label copy" x="400" y="402">
    <tspan x="400" dy="0">Data processing</tspan>
    <tspan x="400" dy="28">module</tspan>
  </text>

  <rect class="block" x="520" y="300" width="195" height="165" rx="28" />
  <text class="label copy" x="617" y="360">
    <tspan x="617" dy="0">Unidirectional</tspan>
    <tspan x="617" dy="28">Receiver Fiber</tspan>
    <tspan x="617" dy="28">Optic</tspan>
  </text>

  <rect class="block" x="1030" y="225" width="190" height="88" rx="14" />
  <text class="label copy" x="1125" y="263">
    <tspan x="1125" dy="0">Storage</tspan>
    <tspan x="1125" dy="28">modules</tspan>
  </text>

  <rect class="block" x="1265" y="225" width="160" height="88" rx="14" />
  <text class="label copy" x="1345" y="263">
    <tspan x="1345" dy="0">secure network</tspan>
    <tspan x="1345" dy="28">port</tspan>
  </text>

  <rect class="block" x="1030" y="365" width="200" height="92" rx="14" />
  <text class="label copy" x="1130" y="402">
    <tspan x="1130" dy="0">Data processing</tspan>
    <tspan x="1130" dy="28">module</tspan>
  </text>

  <rect class="block" x="1290" y="365" width="170" height="70" rx="14" />
  <text class="label copy" x="1375" y="408">power supply</text>

  <rect class="block" x="1185" y="510" width="190" height="68" rx="14" />
  <text class="label copy" x="1280" y="553">I/O</text>

  <rect class="block" x="840" y="320" width="195" height="145" rx="28" />
  <text class="label copy" x="938" y="375">
    <tspan x="938" dy="0">Unidirectional</tspan>
    <tspan x="938" dy="28">sender Fiber</tspan>
    <tspan x="938" dy="28">Optic</tspan>
  </text>

  <line class="line" x1="300" y1="268" x2="400" y2="365" />
  <line class="line" x1="405" y1="313" x2="405" y2="365" />
  <line class="line" x1="188" y1="400" x2="300" y2="400" />
  <line class="line" x1="235" y1="510" x2="337" y2="457" />
  <line class="line" x1="500" y1="410" x2="520" y2="394" />

  <line class="line" x1="715" y1="382" x2="840" y2="382" />
  <line class="line" x1="1035" y1="382" x2="1030" y2="382" />
  <line class="line" x1="1230" y1="404" x2="1290" y2="400" />
  <line class="line" x1="1125" y1="313" x2="1130" y2="365" />
  <line class="line" x1="1265" y1="268" x2="1175" y2="365" />
  <line class="line" x1="1230" y1="434" x2="1278" y2="510" />
</svg>
