<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consumer Behaviour Analytics Dashboard | Tianyu Zhang</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body class="detail-page" data-project-slug="analytics-dashboard" data-nav-base-path="../">
    <div id="dots"></div>
    <div id="page" class="site">
      <a class="skip-link screen-reader-text" href="#content">Skip to content</a>

      <header id="masthead" class="site-header">
        <div class="header-content">
          <a class="logo" href="../index.html" aria-label="Tianyu Zhang homepage">
            <span class="logo-mark" id="wordmark-primary"></span>
            <span class="logo-submark" id="wordmark-secondary"></span>
          </a>

          <nav id="site-navigation" class="main-navigation" aria-label="Primary navigation">
            <ul id="nav-list" class="menu"></ul>
          </nav>
        </div>
      </header>

      <div id="content" class="site-content">
        <div id="primary" class="content-area">
          <main id="main" class="site-main">
            <div class="project-header">
              <div class="project-title">
                <h1 id="detail-title"></h1>
              </div>

              <div class="project-pagination">
                <div class="pagination-buttons">
                  <a id="detail-prev-link" class="btn btn-s" href="#">&lt; Prev</a>
                  <a id="detail-next-link" class="btn btn-s" href="#">Next &gt;</a>
                </div>
              </div>

              <div class="project-url">
                <a id="detail-visit-link" class="btn btn-s btn-wide" href="#">Visit Project</a>
              </div>
            </div>

            <div class="project-content">
              <div class="project-data">
                <div class="data-set">
                  <div class="stack">
                    <p>Tech Stack:&nbsp;</p>
                    <ul class="discipline-type" id="detail-meta-stack"></ul>
                  </div>
                </div>
              </div>

              <div class="featured-image">
                <img id="detail-featured-image" src="" alt="" />
              </div>

              <div class="project-details">
                <div id="detail-details-body"></div>

                <blockquote id="detail-project-quote" class="project-quote">
                  <div id="detail-quote-body"></div>
                  <div>
                    <p><strong id="detail-quote-credit"></strong></p>
                  </div>
                </blockquote>
              </div>
            </div>

            <div class="project-aside">
              <div id="detail-aside-logo"></div>

              <a id="detail-longform-link" class="project-longform-image suppressed" href="#">
                <img id="detail-longform-image" src="" alt="" />
              </a>
            </div>
          </main>
        </div>
      </div>
    </div>

    <div
      id="detail-image-lightbox"
      class="detail-image-lightbox"
      hidden
      aria-hidden="true"
    >
      <button
        id="detail-image-lightbox-backdrop"
        class="detail-image-lightbox-backdrop"
        type="button"
        aria-label="Close image preview"
      ></button>
      <div
        id="detail-image-lightbox-dialog"
        class="detail-image-lightbox-dialog"
        role="dialog"
        aria-modal="true"
        aria-label="Project image preview"
      >
        <button
          id="detail-image-lightbox-close"
          class="detail-image-lightbox-close"
          type="button"
          aria-label="Close image preview"
        >
          <span class="detail-image-lightbox-close-mark" aria-hidden="true">×</span>
          <span>CLOSE</span>
        </button>
        <img id="detail-image-lightbox-image" class="detail-image-lightbox-image" src="" alt="" />
        <p id="detail-image-lightbox-caption" class="detail-image-lightbox-caption"></p>
        <div class="detail-image-lightbox-pagination">
          <button
            id="detail-image-lightbox-prev"
            class="btn btn-s detail-image-lightbox-nav"
            type="button"
            data-text="< PREV"
            aria-label="View previous image"
          >
            <span>&lt; PREV</span>
          </button>
          <button
            id="detail-image-lightbox-next"
            class="btn btn-s detail-image-lightbox-nav"
            type="button"
            data-text="NEXT >"
            aria-label="View next image"
          >
            <span>NEXT &gt;</span>
          </button>
        </div>
      </div>
    </div>

    <script src="../assets/vendor/three.min.js"></script>
    <script src="../assets/vendor/vanta.dots.min.js"></script>
    <script type="module" src="../project-detail.js"></script>
  </body>
</html>
